// ---- SCORING RULES ----
// Group stage: 3pts exact score, 1pt correct outcome (W/D/L)
// Knockout: 2pts correct winner
// Quick Picks: Champion=5, Runner-up=3, 3rd=2, 4th=1
// Golden Boot / MVP: 3pts each
const SCORE_EXACT = 3, SCORE_OUTCOME = 1, SCORE_KO = 2;
const SCORE_QP = {QP_WIN:5, QP_RUN:3, QP_3RD:2, QP_4TH:1, GOLDEN_BOOT:3, MVP:3};

function getOutcome(score) {
  // score like "2-1" → "home" | "away" | "draw" | null
  if (!score || !score.includes("-")) return null;
  const [g1, g2] = score.split("-").map(Number);
  if (isNaN(g1) || isNaN(g2)) return null;
  if (g1 > g2) return "home";
  if (g1 < g2) return "away";
  return "draw";
}

function calcPlayerScore(pid, preds, results, players) {
  // results: { [matchId]: "2-1" or teamName for KO, GOLDEN_BOOT, MVP, QP_WIN/RUN/3RD/4TH }
  let total = 0;
  const breakdown = { groupExact:0, groupOutcome:0, koCorrect:0, qpPoints:0, awardPoints:0 };
  const myMode = effectiveMode(pid, preds);

  // Group matches & knockout match-winner picks only ever count for Full Bracket players.
  // Quick Pick players never entered these, but score them defensively only when in full mode
  // so a stray/leftover key under their pid can never sneak in extra points outside their 6 picks.
  if (myMode === "full") {
    GM.forEach(m => {
      const actual = results[m.id];
      const pred   = preds[pid + "-" + m.id];
      if (!actual || !pred) return;
      if (actual === pred) { total += SCORE_EXACT; breakdown.groupExact += SCORE_EXACT; return; }
      if (getOutcome(actual) && getOutcome(actual) === getOutcome(pred)) {
        total += SCORE_OUTCOME; breakdown.groupOutcome += SCORE_OUTCOME;
      }
    });

    // Knockout matches (M73–M104): result stored as winning team name
    const KO_IDS = [...R32, ...R16, ...QF, ...SF, {id:"M103"}, {id:"M104"}].map(m => m.id);
    KO_IDS.forEach(mid => {
      const actual = results[mid];
      const pred   = preds[pid + "-" + mid];
      if (!actual || !pred) return;
      if (actual === pred) { total += SCORE_KO; breakdown.koCorrect += SCORE_KO; }
    });
  }

  // Quick picks + awards — the only category that ever counts for Quick Pick players,
  // and the only thing that resolves once finals/awards are decided.
  const qpKeys = Object.keys(SCORE_QP);
  qpKeys.forEach(key => {
    const actual = results[key]; // e.g. results["QP_WIN"] = "Brazil"
    if (!actual) return;
    // For Full-bracket players, check bracket picks for podium equivalent
    let pred;
    if (myMode === "quick") {
      pred = preds[pid + "-" + key];
    } else {
      // Full-bracket: QP_WIN uses M104 pick, QP_RUN derived, QP_3RD uses M103 pick
      if (key === "QP_WIN") pred = preds[pid + "-M104"];
      else if (key === "QP_3RD") pred = preds[pid + "-M103"];
      else if (key === "GOLDEN_BOOT" || key === "MVP") pred = preds[pid + "-" + key];
      else pred = preds[pid + "-" + key]; // QP_RUN/4TH: full bracket players can also fill these
    }
    if (!pred || typeof pred !== "string") return;
    if (pred.trim().toLowerCase() === actual.trim().toLowerCase()) {
      total += SCORE_QP[key];
      if (key === "GOLDEN_BOOT" || key === "MVP") breakdown.awardPoints += SCORE_QP[key];
      else breakdown.qpPoints += SCORE_QP[key];
    }
  });

  return { total, breakdown };
}

function calcAllScores(players, preds, results) {
  return players.map(p => {
    const s = calcPlayerScore(p.id, preds, results, players);
    return {...p, ...s};
  }).sort((a, b) => b.total - a.total);
}

// A player's stored MODE flag can go stale (e.g. someone tried Quick Picks first via the
// CBF button, then went back and filled in a full bracket without ever flipping the flag).
// So mode is re-derived from what they've actually filled in: a meaningful number of group
// score predictions means they're playing Full Bracket, full stop, regardless of the stored flag.
const FULL_MODE_THRESHOLD = 10; // a handful of group scores is enough to call it "playing full bracket"
function effectiveMode(pid, preds) {
  const groupPicksMade = GM.filter(m => {
    const v = preds[pid + "-" + m.id];
    return v && /^\d+-\d+$/.test(v);
  }).length;
  if (groupPicksMade >= FULL_MODE_THRESHOLD) return "full";
  return preds[pid + "-MODE"] === "quick" ? "quick" : (preds[pid + "-MODE"] || null);
}

function assignThirds(thirds) {
  // thirds: [{team, group}] - the 8 best third-placed teams
  // Returns {T1: teamName, ...} respecting allowed-group constraints via backtracking
  const result = {};
  const used = new Array(thirds.length).fill(false);
  function bt(slotIdx) {
    if (slotIdx === THIRD_SLOTS.length) return true;
    const slot = THIRD_SLOTS[slotIdx];
    for (let i = 0; i < thirds.length; i++) {
      if (used[i]) continue;
      if (slot.allowed.indexOf(thirds[i].group) === -1) continue;
      used[i] = true;
      result[slot.slot] = thirds[i].team;
      if (bt(slotIdx + 1)) return true;
      used[i] = false;
      delete result[slot.slot];
    }
    return false;
  }
  if (!bt(0)) {
    // Fallback: assign in order if constraints unsatisfiable
    THIRD_SLOTS.forEach((s, i) => { result[s.slot] = thirds[i] ? thirds[i].team : null; });
  }

}

  {id:"M87",s1:"1K",s2:"T8",d:"Jul 3"},
  {id:"M88",s1:"2D",s2:"2G",d:"Jul 3"}
];
const R16 = [
  {id:"M89",f1:"M74",f2:"M77",d:"Jul 4"},
  {id:"M90",f1:"M73",f2:"M75",d:"Jul 4"},
  {id:"M91",f1:"M76",f2:"M78",d:"Jul 5"},

];
const QF = [
  {id:"M97",f1:"M89",f2:"M90",d:"Jul 9"},

  {id:"M99",f1:"M91",f2:"M92",d:"Jul 10"},

];
const SF = [
  {id:"M101",f1:"M97",f2:"M98",d:"Jul 14"},
  {id:"M102",f1:"M99",f2:"M100",d:"Jul 15"}
];
// Display order: adjacent pairs feed the match next to them (matches official flowchart)
const R32_ORDER = ["M74","M77","M73","M75","M83","M84","M81","M82","M76","M78","M79","M80","M86","M88","M85","M87"];
const R16_ORDER = ["M89","M90","M93","M94","M91","M92","M95","M96"];
const QF_ORDER = ["M97","M98","M99","M100"];
const orderBy = (arr, order) => order.map(id => arr.find(m => m.id === id));

function calcStandings(pid, preds) {
  const st = {};
  Object.keys(GT).forEach(g => {
    st[g] = GT[g].map(t => ({team:t, pts:0, played:0, w:0, d:0, l:0, gf:0, ga:0}));
  });
  GM.forEach(m => {
    const sc = preds[pid + "-" + m.id];
    if (!sc || !sc.includes("-")) return;
    const parts = sc.split("-");
    const gf = parseInt(parts[0]), ga = parseInt(parts[1]);
    if (isNaN(gf) || isNaN(ga)) return;
    const t1 = st[m.g].find(t => t.team === m.t1);
    const t2 = st[m.g].find(t => t.team === m.t2);
    if (!t1 || !t2) return;
    t1.gf += gf; t1.ga += ga; t1.played++;
    t2.gf += ga; t2.ga += gf; t2.played++;
    if (gf > ga) { t1.pts += 3; t1.w++; t2.l++; }
    else if (gf < ga) { t2.pts += 3; t2.w++; t1.l++; }
    else { t1.pts++; t2.pts++; t1.d++; t2.d++; }
  });
  const q = {};
  const thirds = [];
  Object.keys(st).forEach(g => {
    st[g].sort((a, b) => {
      if (b.pts !== a.pts) return b.pts - a.pts;
      const gdb = b.gf - b.ga, gda = a.gf - a.ga;
      if (gdb !== gda) return gdb - gda;
      return b.gf - a.gf;
    });
    q[g] = {first: st[g][0] ? st[g][0].team : null, second: st[g][1] ? st[g][1].team : null};
    if (st[g][2] && st[g][2].played > 0) thirds.push({team: st[g][2].team, group: g, pts: st[g][2].pts, gf: st[g][2].gf, ga: st[g][2].ga});
  });
  thirds.sort((a, b) => {
    if (b.pts !== a.pts) return b.pts - a.pts;
    const gdb = b.gf - b.ga, gda = a.gf - a.ga;
    if (gdb !== gda) return gdb - gda;
    return b.gf - a.gf;
  });
  const bestThirds = thirds.slice(0, 8);
  return {standings: st, qualified: q, bestThirds: bestThirds};
}

function App() {
  const [players, setPlayers] = useState([]);

  const [pinStage, setPinStage] = useState(null);

  const [pinError, setPinError] = useState("");

  const [editUnlocked, setEditUnlocked] = useState(true);

  // ---- "What's new" notice on the login screen ----
  // Bump this string whenever the notice content changes, so returning players see it again once.
  const WHATS_NEW_VERSION = "2026-06-20-v1";
  const [whatsNewDismissed, setWhatsNewDismissedState] = useState(() => {
    try { return localStorage.getItem("wc26_whatsnew_dismissed") === WHATS_NEW_VERSION; }
    catch { return false; }
  });
  const setWhatsNewDismissed = (val) => {
    setWhatsNewDismissedState(val);
    try { if (val) localStorage.setItem("wc26_whatsnew_dismissed", WHATS_NEW_VERSION); } catch {}
  };

  // Pure helper — no dependency on component state — hoisted up here since the ticker
  // useMemo below needs it, and useMemo/useState must run before any early return.
  const fmtKO = (ms) => new Date(ms).toLocaleString(undefined, {weekday: "short", day: "numeric", month: "short", hour: "numeric", minute: "2-digit"});

  // ---- TICKER TAPE hooks ----
  // These must live before any early `return` below (loading/live/setup/login/mode-choice screens
  // each return early) so the hook count stays identical on every render — calling hooks after an
  // early return is what crashes React with "Rendered more hooks than during the previous render."
  const [tickerIdx, setTickerIdx] = useState(0);
  const [tickerHidden, setTickerHidden] = useState(false);
  const tickerItems = useMemo(() => {
    if (!started) return [];
    const items = [];

    // Most recent group result with a kickoff time (so we can find the latest chronologically)
    const playedGroup = GM.filter(m => results[m.id] && KICKOFF[m.id]);
    if (playedGroup.length) {
      const latest = playedGroup.slice().sort((a, b) => KICKOFF[b.id] - KICKOFF[a.id])[0];
      items.push({icon: "\uD83C\uDFC1", text: latest.t1 + " " + results[latest.id].replace("-", " - ") + " " + latest.t2 + " \u00b7 Full Time"});
    }

    // Next upcoming kickoff (group stage)
    const upcoming = GM.filter(m => KICKOFF[m.id] && KICKOFF[m.id] > nowTick).sort((a, b) => KICKOFF[a.id] - KICKOFF[b.id])[0];
    if (upcoming) {
      items.push({icon: "\u23F1", text: "Next: " + upcoming.t1 + " vs " + upcoming.t2 + " \u00b7 " + fmtKO(KICKOFF[upcoming.id])});
    }

    // Leaderboard leaders, split by mode (only once at least one player has scored)
    if (players.length) {
      const scored = calcAllScores(players, preds, results);
      const fullBoard  = scored.filter(p => effectiveMode(p.id, preds) !== "quick" && effectiveMode(p.id, preds) !== null);
      const quickBoard = scored.filter(p => effectiveMode(p.id, preds) === "quick");
      if (fullBoard.length && fullBoard[0].total > 0) {
        items.push({icon: "\uD83D\uDC51", text: "Leading Full Bracket: " + fullBoard[0].name + " \u2014 " + fullBoard[0].total + " pts"});
        if (fullBoard.length > 1 && (fullBoard[0].total - fullBoard[1].total) <= 3) {
          items.push({icon: "\uD83D\uDD25", text: "Tight race: " + fullBoard[0].name + " & " + fullBoard[1].name + " separated by " + (fullBoard[0].total - fullBoard[1].total) + " pt" + ((fullBoard[0].total - fullBoard[1].total) === 1 ? "" : "s")});
        }
      }

      }
    }

    if (!items.length) items.push({icon: "\uD83D\uDCE3", text: "Tournament underway \u2014 check back once results start rolling in!"});
    return items;
  }, [started, results, players, preds, nowTick]);
  useEffect(() => {
    if (tickerItems.length <= 1) return;
    const iv = setInterval(() => setTickerIdx(i => (i + 1) % tickerItems.length), 5000);
    return () => clearInterval(iv);
  }, [tickerItems.length]);

  const persist = (key, val) => {
    setSaveStatus("saving");
    fbSetKey(key, val).then(ok => {
      setSaveStatus(ok ? "saved" : "error");
      clearTimeout(saveTimer.current);
      saveTimer.current = setTimeout(() => setSaveStatus(null), 2500);
    });
  };

  // Registration stays open through the entire group stage — late joiners can still
  // jump in with Quick Picks or a partial bracket even if they can't catch the max score.
  const regOpen = () => nowTick < KNOCKOUT_LOCK;
  const activeId = viewId || pid;
  const isRO = !!(viewId && viewId !== pid) || (!!pid && !viewId && !editUnlocked);

  useEffect(() => {
    const load = async () => {
      const d = await fbGet("/");
      if (d) {
        if (d.players) setPlayers(Object.values(d.players));
        if (d.predictions) {
          setPreds(prev => {
            const merged = {...d.predictions};
            const now = Date.now();
            Object.keys(recentEdits.current).forEach(k => {
              if (now - recentEdits.current[k] < 15000) {
                if (prev[k] !== undefined) merged[k] = prev[k];
              } else {
                delete recentEdits.current[k];
              }
            });
            return merged;
          });
        }
        if (d.results) setResults(d.results);
        if (d.tournamentStarted) setStarted(true);
      }
      setNowTick(Date.now());
      setLoading(false);
    };
    load();
    const iv = setInterval(load, 8000);
    return () => clearInterval(iv);
  }, []);

  // ---- AUTO-SYNC from wc2026api.com ----
  const syncLiveScores = async () => {
    setSyncStatus("syncing");
    try {
      const res = await fetch(
        "https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json"
      );
      if (!res.ok) { setSyncStatus("error"); return; }
      const data = await res.json();
      const matches = data.matches || [];

      // Team name differences between openfootball and our app
      const TN = {
        "Bosnia & Herzegovina": "Bosnia-Herzegovina",
        "Czech Republic":       "Czechia",
        "Cura\u00e7ao":         "Curacao",
        "DR Congo":             "Congo DR",
        "Turkey":               "Turkiye",
        "USA":                  "United States",
        "South Korea":          "South Korea",
        "Ivory Coast":          "Ivory Coast",
      };
      const norm = t => TN[t] || t;

      // Build a lookup from "team1|team2" → our GM match id
      const gmLookup = {};
      GM.forEach(m => {
        gmLookup[m.t1 + "|" + m.t2] = m.id;
        gmLookup[m.t2 + "|" + m.t1] = m.id; // handle flipped order
      });

      const updates = {};

      matches.forEach(m => {
        if (!m.score) return; // no result yet
        const sc = m.score;
        const ft = sc.ft; // [score1, score2] at full time
        if (!ft) return;

        const t1 = norm(m.team1);
        const t2 = norm(m.team2);

        if (m.group) {
          // Group stage match — store as "score1-score2"
          // Try direct key first, then flipped
          const id = gmLookup[t1 + "|" + t2] || gmLookup[t2 + "|" + t1];
          if (id) {
            // If teams are flipped vs our data, swap scores
            const gm = GM.find(x => x.id === id);
            if (gm && gm.t1 === t2) {
              updates[id] = ft[1] + "-" + ft[0]; // swap
            } else {
              updates[id] = ft[0] + "-" + ft[1];
            }
          }
        } else {
          // Knockout match — team names are W73/W74 placeholders until known
          // openfootball uses W73..W104 for KO match winners
          // round field tells us which round it is
          // We identify by the winning team name once scores are in
          const round = (m.round || "").toLowerCase();
          // Determine winner
          let winner = null;
          if (sc.p) {
            // Penalties — winner is whoever won the shootout
            winner = sc.p[0] > sc.p[1] ? t1 : t2;
          } else if (ft[0] !== ft[1]) {
            winner = ft[0] > ft[1] ? t1 : t2;
          }
          // Match openfootball KO matches to our M73..M104 by team names
          // We scan our KO match list to find the right match
          if (winner) {
            const allKO = [...R32, ...R16, ...QF, ...SF,
                           {id:"M103"}, {id:"M104"}];
            // Try to match by team names appearing in the KO slot
            // Since slots use placeholder codes (1A, 2B etc), we match by round + teams
            // The most reliable signal: if t1 and t2 are real team names (not codes)
            if (!t1.match(/^[0-9W]/) && !t2.match(/^[0-9W]/)) {
              // Both are real team names — find which KO match has these two teams
              // by checking our resolved slots (already in preds via calcStandings)
              // We store by looking for the match that has both team names as slots
              // Simplest: match on round label
              const roundMap = {
                "round of 32":  R32,
                "round of 16":  R16,
                "quarter-final": QF,
                "quarter-finals": QF,
                "semi-final":   SF,
                "semi-finals":  SF,
                "third place":  [{id:"M103"}],
                "third-place":  [{id:"M103"}],
                "final":        [{id:"M104"}],
              };
              // Find round bucket
              let bucket = null;
              for (const [k, v] of Object.entries(roundMap)) {
                if (round.includes(k)) { bucket = v; break; }
              }
              // Within bucket, check if we already have a result for any match
              // and this one isn't it — just store all matches in the round
              // For now store winner under a temp key; admin can review
              // Better: match by date order within the round
              // openfootball KO data will have W73/W74 as team names until groups finish
              // So this branch only fires when real names are known
              if (bucket) {
                // Find first unfilled slot in this round
                const unfilled = bucket.find(bm => !updates[bm.id] && !results[bm.id]);
                if (unfilled) updates[unfilled.id] = winner;
              }
            }
          }
        }
      });

      // Only write changed values
      const toWrite = {};
      Object.entries(updates).forEach(([k, v]) => {
        if (results[k] !== v) toWrite[k] = v;
      });
      if (Object.keys(toWrite).length > 0) {
        await Promise.all(Object.entries(toWrite).map(([k, v]) => fbSetResult(k, v)));
        setResults(prev => ({...prev, ...toWrite}));
      }
      setLastSynced(new Date());
      setSyncStatus("ok");
    } catch (err) {
      setSyncStatus("error");
    }
  };

  // Auto-sync every 30 minutes (openfootball updates ~once a day, so no need to hammer it)
  useEffect(() => {
    syncLiveScores();
    const iv = setInterval(syncLiveScores, 30 * 60 * 1000);
    return () => clearInterval(iv);
  }, []);

  // playerHasPicks: true if this player has made ANY prediction yet (used to decide
  // whether a pin-less player is treated as "new" (must set pin) or "existing" (can skip, read-only).
  const playerHasPicks = (id) => Object.keys(preds).some(k => k.startsWith(id + "-"));

  const addPlayer = async (pin) => {
    const n = newName.trim();
    if (!n) return;
    const p = {id: Date.now().toString(), name: n, pin: pin || ""};
    const up = [...players, p];
    setPlayers(up);

  const setPlayerPin = async (id, pin) => {

  // Clicking a name in the login grid routes through the pin gate rather than logging in directly.

  const login = (id, name, unlocked) => {

  const confirmPinEntry = () => {
    const player = players.find(p => p.id === pinStage.id);

  const viewReadOnlyInsteadOfPin = () => {

  const confirmSetPin = async (skip) => {
    if (skip) {
      // Optional flow only: log in read-only, no pin set yet.

  const logout = () => { setPid(null); setPname(""); setViewId(null); setTab("login"); setEditUnlocked(true); setPinStage(null); };

  // ---- Kickoff locking ----
  const isLockedKey = (mid) => {
    if (KICKOFF[mid]) return nowTick >= KICKOFF[mid];               // group match: locks at its own kickoff
    if (mid === "MODE") return false;                                // play mode is never locked
    if (QP_KEYS.indexOf(mid) !== -1 || /^M\d+$/.test(mid)) return nowTick >= KNOCKOUT_LOCK; // bracket + quick picks + awards
    return false;
  };
  const bracketLocked = nowTick >= KNOCKOUT_LOCK;

  const setPred = (mid, val) => {
    if (isRO || !pid || isLockedKey(mid)) return;
    const key = pid + "-" + mid;
    recentEdits.current[key] = Date.now();
    const ne = {...errs};
    if (val && mid.indexOf("GOLDEN") === -1 && mid !== "MVP" && !/^\d+-\d+$/.test(val)) {
      ne[mid] = true;
      setErrs(ne);
      setPreds(prev => ({...prev, [key]: val}));
      return;
    }
    delete ne[mid];
    setErrs(ne);
    setPreds(prev => ({...prev, [key]: val}));
    persist(key, val);
  };

  const setKO = (mid, val) => {
    if (isRO || !pid || isLockedKey(mid)) return;
    const key = pid + "-" + mid;
    recentEdits.current[key] = Date.now();
    setPreds(prev => ({...prev, [key]: val}));
    persist(key, val);
  };

  // Switch to viewing another player's picks; jump to the tab that matches their play mode
  const switchView = (id) => {
    if (!id || id === pid) { setViewId(null); return; }
    setViewId(id);
    const m = effectiveMode(id, preds);
    if (m === "quick") setTab("quick");
    else if (tab === "quick") setTab("bracket");
  };

  const getPred = (mid) => preds[activeId + "-" + mid] || "";
  // Validated knockout winner resolver: returns the pick ONLY if it's still one of the two valid teams
  const koTeams = {};
  const sfLoser = (sfId) => {
    const m = SF.find(x => x.id === sfId);
    if (!m) return null;
    const a = resolveKO(m.f1), b = resolveKO(m.f2);
    const w = resolveKO(sfId);
    if (!a || !b || !w) return null;
    return w === a ? b : a;
  };
  const resolveKO = (mid) => {
    if (koTeams[mid] !== undefined) return koTeams[mid];
    let t1 = null, t2 = null;
    const r32 = R32.find(m => m.id === mid);
    if (r32) { t1 = slotsRef.current[r32.s1]; t2 = slotsRef.current[r32.s2]; }
    else {
      const m = R16.find(x => x.id === mid) || QF.find(x => x.id === mid) || SF.find(x => x.id === mid);
      if (m) { t1 = resolveKO(m.f1); t2 = resolveKO(m.f2); }
      else if (mid === "M104") { t1 = resolveKO("M101"); t2 = resolveKO("M102"); }
      else if (mid === "M103") {
        const l1 = sfLoser("M101"), l2 = sfLoser("M102");
        t1 = l1; t2 = l2;
      }
    }
    const pick = preds[activeId + "-" + mid] || null;
    const valid = (pick && (pick === t1 || pick === t2)) ? pick : null;
    koTeams[mid] = valid;
    return valid;
  };
  const gKO = (mid) => resolveKO(mid);

  const calcResult = useMemo(
    () => activeId ? calcStandings(activeId, preds) : {standings: {}, qualified: {}, bestThirds: []},
    [activeId, preds]
  );
  const standings = calcResult.standings;
  const qualified = calcResult.qualified;
  const bestThirds = calcResult.bestThirds || [];

  const slotsRef = useRef({});
  const slots = useMemo(() => {
    if (!activeId) return {};
    const s = {};
    Object.keys(qualified).forEach(g => {
      s["1" + g] = qualified[g].first;
      s["2" + g] = qualified[g].second;

    if (bestThirds.length === 8) {

    } else {

        e("div", {className: "mb-4"},
          e("button", {

  } else {

          // SVG overlay: measures real .bmatch positions, draws arrows with correct tips

            const [segs, setSegs] = React.useState([]);

              const draw = () => {
                const wrap = wrapRef.current;

                if (!wrap) return;
                const wr = wrap.getBoundingClientRect();
                const allCols = Array.from(wrap.querySelectorAll(".bcol"));

                //              4=P2_SF(1), 5=P2_QF(2), 6=P2_R16(4), 7=P2_R32(8)

                // With align-items:center, the SF card sits at the vertical middle of the wrap.

                if (centre && finalCard && colCards[3] && colCards[3][0]) {
                  const sfCard = allCols[3] && allCols[3].querySelector(".bmatch");
                  if (sfCard) {
                    const sfR   = sfCard.getBoundingClientRect();
                    const sfMid = sfR.top - wr.top + sfR.height / 2; // SF midpoint relative to wrap
                    // Elements above the Final card inside bcentre:
                    const podiumEl     = centre.querySelector(".bcentre-podium");
                    const podiumH      = podiumEl ? podiumEl.getBoundingClientRect().height : 0;
                    const podiumMargin = 36; // bcentre-podium margin-bottom
                    const finalLabelEl = centre.querySelector(".bcentre-final > div:first-child");
                    const finalLabelH  = finalLabelEl ? finalLabelEl.getBoundingClientRect().height : 28;
                    const finalLabelMb = 10; // margin-bottom on the label div
                    const fcR          = finalCard.getBoundingClientRect();
                    const finalCardH   = fcR.height;
                    // Without any padding-top, the Final card midpoint is at:
                    // podiumH + podiumMargin + finalLabelH + finalLabelMb + finalCardH/2
                    // We want that to equal sfMid, so:
                    const naturalFinalMid = podiumH + podiumMargin + finalLabelH + finalLabelMb + finalCardH / 2;
                    const needed = Math.max(0, sfMid - naturalFinalMid);
                    centre.style.paddingTop = needed + "px";

                // Re-measure after padding adjustment (next frame)
                const buildSegs = () => {
                  const finalCard2 = wrap.querySelector(".final-card");
                  if (!finalCard2) return;
                  const fc2R = finalCard2.getBoundingClientRect();
                  const fc = {xL:fc2R.left-wr.left, xR:fc2R.right-wr.left, y:fc2R.top-wr.top+fc2R.height/2};

                  // Arrow size — path stops behind the arrowhead tip
                  const AH = 9; // arrowhead depth in px — path terminates this far before tip

                  // Regular column pairs: cubic bezier, path ends AH px behind arrowhead tip
                  const makePairs = (lCol, rCol, dir) => {

                    if (!lCol || !rCol || !lCol.length || !rCol.length) return out;
                    rCol.forEach((dst, i) => {
                      [lCol[i*2], lCol[i*2+1]].filter(Boolean).forEach(src => {
                        const x0  = dir==="ltr" ? src.xR + 4 : src.xL - 4;
                        const tip = dir==="ltr" ? dst.xL - 4 : dst.xR + 4;
                        const x1  = dir==="ltr" ? tip - AH    : tip + AH; // path ends before tip
                        const mx  = (x0 + x1) / 2;
                        out.push({d:`M${x0},${src.y} C${mx},${src.y} ${mx},${dst.y} ${x1},${dst.y}`,

                      });
                    });

                    const x1  = tip - AH;

                  }
                  if (sfR) {
                    const x0  = sfR.xL - 4;
                    const tip = fc.xR + 4;
                    const x1  = tip + AH;

                    ...makePairs(colCards[0],colCards[1],"ltr"),

                    ...makePairs(colCards[2],colCards[3],"ltr"),
                    ...makePairs(colCards[7],colCards[6],"rtl"),
                    ...makePairs(colCards[6],colCards[5],"rtl"),
                    ...makePairs(colCards[5],colCards[4],"rtl"),
                    ...sfSegs
                  ]);

              };

              e("div",{style:{display:"flex",justifyContent:"space-between",padding:"3px 6px"}},

                e("span",{style:{fontWeight:700,color:getPred("GOLDEN_BOOT")?"#1e3a5f":"#b8b8b8",fontSize:"10px",fontStyle:getPred("GOLDEN_BOOT")?"normal":"italic"}},getPred("GOLDEN_BOOT")||"TBD")
              ),
              e("div",{style:{display:"flex",justifyContent:"space-between",padding:"3px 6px",marginTop:"2px"}},
                e("span",{style:{fontWeight:700,color:"#92400e",fontSize:"10px"}},"\u2B50 MVP"),
                e("span",{style:{fontWeight:700,color:getPred("MVP")?"#1e3a5f":"#b8b8b8",fontSize:"10px",fontStyle:getPred("MVP")?"normal":"italic"}},getPred("MVP")||"TBD")

              const finalT1 = gKO("M101"), finalT2 = gKO("M102");
              const champ   = gKO("M104");
              const runner  = (champ&&finalT1&&finalT2) ? (champ===finalT1?finalT2:finalT1) : null;
              const third   = gKO("M103");
              return [
                e("div",{key:"bronze-m", className:"mb-3"},
                  e("div",{className:"text-center text-[10px] font-extrabold text-amber-800 bg-orange-100 rounded-md py-1 mb-2"}, "BRONZE \u00B7 Jul 18"),
                  renderBMatch({mid:"M103",t1:sfLoser("M101"),t2:sfLoser("M102"),date:"Jul 18",label:"M103",waitingOn:"M101 & M102"})

      const byTime2 = (a, b) => (KICKOFF[a.id] || 0) - (KICKOFF[b.id] || 0);

      // Compute actual standings from results (mirrors calcStandings but uses results, not preds)
      const actualSt = {};
      Object.keys(GT).forEach(g => {
        actualSt[g] = GT[g].map(t => ({team:t, pts:0, played:0, w:0, d:0, l:0, gf:0, ga:0}));
      });
      GM.forEach(m => {
        const sc = results[m.id];
        if (!sc || !sc.includes("-")) return;
        const [gf, ga] = sc.split("-").map(Number);
        if (isNaN(gf) || isNaN(ga)) return;
        const t1 = actualSt[m.g].find(t => t.team === m.t1);
        const t2 = actualSt[m.g].find(t => t.team === m.t2);
        if (!t1 || !t2) return;
        t1.gf += gf; t1.ga += ga; t1.played++;
        t2.gf += ga; t2.ga += gf; t2.played++;
        if (gf > ga) { t1.pts += 3; t1.w++; t2.l++; }
        else if (gf < ga) { t2.pts += 3; t2.w++; t1.l++; }
        else { t1.pts++; t2.pts++; t1.d++; t2.d++; }
      });
      Object.keys(actualSt).forEach(g => {
        actualSt[g].sort((a, b) => {
          if (b.pts !== a.pts) return b.pts - a.pts;
          const gdb = b.gf - b.ga, gda = a.gf - a.ga;
          if (gdb !== gda) return gdb - gda;
          return b.gf - a.gf;
        });

          }, "\uD83D\uDD04 Sync now")
        ),

        livePreview,
        e("div", {className: "mt-6 space-y-0"},
          groupResultsSection,
          koResultsSection,
          awardsSection

      );

    // --- If viewing a Quick Picks player, show their podium summary on any non-quick tab ---
    const activeMode = preds[activeId + "-MODE"];
    if (isRO && activeMode === "quick" && tab !== "quick") {
      const viewedName = (players.find(p => p.id === viewId) || {}).name || "This player";
      const qpRow = (lbl, val, bg, flagSz, medal) => e("div", {key: lbl, className: "flex items-center gap-3 px-4 py-3 rounded-xl mb-2", style: {background: bg || "#f1f5f9"}},

        e("span", {className: "text-sm font-bold text-blue-900 flex-1"}, lbl),

    // --- Progress navigator (own picks only): tap a card to jump to that section ---
    let progressStrip = null;

      const groupDone = GM.filter(m => /^\d+-\d+$/.test(preds[activeId + "-" + m.id] || "")).length;
      const KO_IDS = R32.map(m => m.id).concat(R16.map(m => m.id), QF.map(m => m.id), ["M101", "M102", "M103", "M104"]);

      const quickKeys = ["QP_WIN", "QP_RUN", "QP_3RD", "QP_4TH", "GOLDEN_BOOT", "MVP"];

        Tab("Knockout Stages", "bracket"),
        Tab("Actual Results", "results"),
        e("button", {key: "live", onClick: () => setLive(true), className: "px-4 py-2 rounded-lg font-semibold text-sm bg-purple-500/80 text-white hover:bg-purple-600"}, "\uD83C\uDFC6 Leaderboard"),
        e("button", {key: "out", onClick: logout, className: "px-4 py-2 rounded-lg font-semibold text-sm bg-red-500/80 text-white hover:bg-red-600"}, "Logout (" + pname + ")")
      ),
      progressStrip,
      mobilePlayerSelect,
      e("div", {className: "flex gap-4 items-start"},
        e("div", {className: "hidden md:block w-48 flex-shrink-0"},
          e("div", {className: "wc-card rounded-2xl p-4 shadow-2xl"},
            e("h3", {className: "text-sm font-bold text-blue-900 mb-3 border-b border-blue-200 pb-2"}, "Players"),
            (() => {
              const playerBtn = p => e("button", {
                key: p.id,
                onClick: () => switchView(p.id === viewId || p.id === pid ? null : p.id),
                className: "w-full text-left px-3 py-2 rounded-lg text-sm font-semibold transition flex items-center justify-between gap-1 " + (
                  p.id === pid ? "bg-yellow-100 text-yellow-800" :
                  p.id === viewId ? "bg-blue-600 text-white" :
                  "text-blue-900 hover:bg-blue-50"
                )
              },
                e("span", {className: "truncate"}, p.id === pid ? p.name + " (you)" : p.name)
              );
              const fullList  = players.filter(p => effectiveMode(p.id, preds) !== "quick");
              const quickList = players.filter(p => effectiveMode(p.id, preds) === "quick");
              const section = (label, list) => list.length > 0 && e("div", {key: label, className: "mb-3"},
                e("div", {className: "text-[10px] font-bold text-blue-400 uppercase tracking-wider px-3 mb-1"}, label),
                e("div", {className: "space-y-1"}, list.map(playerBtn))
              );
              return e("div", null,
                section("Full Bracket", fullList),
                section("Quick Picks", quickList)
              );
            })(),
            viewId && viewId !== pid && e("button", {
              onClick: () => setViewId(null),
              className: "mt-3 w-full text-xs text-gray-500 hover:text-red-500 text-center"
            }, "Back to my picks")
          )
        ),
        e("div", {className: "flex-1 min-w-0"},
          isRO && viewId && e("div", {className: "bg-yellow-50 border border-yellow-300 rounded-xl p-3 mb-4 text-sm font-semibold text-yellow-800 flex items-center justify-between gap-2 flex-wrap"},
            e("span", null, "Viewing: " + ((players.find(p => p.id === viewId) || {}).name) + " (read-only)"),
            e("button", {onClick: () => setViewId(null), className: "px-3 py-1 rounded-lg bg-yellow-200 hover:bg-yellow-300 text-yellow-900 text-xs font-bold"}, "\u2190 Back to my picks")),
          isRO && !viewId && e("div", {className: "bg-amber-50 border border-amber-300 rounded-xl p-3 mb-4 text-sm font-semibold text-amber-800 flex items-center justify-between gap-2 flex-wrap"},
            e("span", null, "\uD83D\uDD12 Read-only \u2014 set a PIN to edit your own picks"),
            e("button", {
              onClick: () => { setPinInput(""); setPinError(""); setPinStage({id: pid, name: pname, mode: "setOptional"}); },
              className: "px-3 py-1 rounded-lg bg-amber-200 hover:bg-amber-300 text-amber-900 text-xs font-bold"
            }, "Set PIN now")),
          tabContent
        )
      )
    );
  }

  if (started && pid && !preds[pid + "-MODE"]) {
    const choose = (mode, t) => { setKO("MODE", mode); setTab(t); };
    // C.B.F. randomiser: sets MODE=quick and randomly fills all QP fields
    const cbf = () => {
      const shuffle = arr => arr.slice().sort(() => Math.random() - 0.5);
      const teams = shuffle(ALL_TEAMS);
      const pool  = shuffle(ALL_TEAMS); // reuse team list for boot/mvp picks
      const saves = [
        ["MODE",         "quick"],
        ["QP_WIN",       teams[0]],
        ["QP_RUN",       teams[1]],
        ["QP_3RD",       teams[2]],
        ["QP_4TH",       teams[3]],
        ["GOLDEN_BOOT",  pool[4]],
        ["MVP",          pool[5]],
      ];
      // All saves fire in order; use the existing persist wrapper
      saves.forEach(([k, v]) => {
        const key = pid + "-" + k;
        recentEdits.current[key] = Date.now();
        setPreds(prev => ({...prev, [key]: v}));
        persist(key, v);
      });
      setTab("quick");
    };
    mainView = e("div", {className: "wc-card rounded-2xl p-8 shadow-2xl max-w-2xl mx-auto text-center"},
      e("h2", {className: "text-3xl font-bold text-blue-900 mb-2"}, "Welcome, " + pname + "!"),
      e("p", {className: "text-gray-500 mb-8"}, "How do you want to play?"),
      e("div", {className: "grid grid-cols-1 md:grid-cols-3 gap-4"},
        e("button", {onClick: () => choose("full", "group"), className: "p-6 rounded-xl border-2 border-blue-300 bg-blue-50 hover:border-blue-600 hover:shadow-lg transition text-left"},
          e("div", {className: "text-xl font-bold text-blue-900 mb-2"}, "Full Bracket"),
          e("div", {className: "text-sm text-gray-600"}, "Predict all 72 group scores, then pick every knockout match through to the Final. Maximum bragging rights.")
        ),
        e("button", {onClick: () => choose("quick", "quick"), className: "p-6 rounded-xl border-2 border-amber-400 bg-amber-50 hover:border-amber-500 hover:shadow-lg transition text-left"},
          e("div", {className: "text-xl font-bold text-amber-700 mb-2"}, "Quick Picks"),
          e("div", {className: "text-sm text-gray-600"}, "Short on time? Just call the Champion, Runner-up, 3rd and 4th place, plus Golden Boot and MVP.")
        ),
        e("button", {onClick: cbf, className: "p-6 rounded-xl border-2 border-purple-400 bg-gradient-to-br from-purple-50 to-pink-50 hover:border-purple-600 hover:shadow-xl transition text-left group"},
          e("div", {className: "text-2xl mb-1"}, "🎲"),
          e("div", {className: "text-xl font-bold text-purple-800 mb-2"}, "C.B.F. Button"),
          e("div", {className: "text-xs font-bold text-purple-500 mb-2 tracking-wider"}, "CLUELESS BUT FOMO"),
          e("div", {className: "text-sm text-gray-600"}, "No idea who'll win? Let fate decide. Randomises your entire Quick Pick in one tap. You have nothing to lose — except possibly your dignity.")
        )
      ),
      e("p", {className: "text-xs text-gray-400 mt-6"}, "Not locked in — you can switch between tabs at any time.")
    );
  }

  // ---- PIN modal (overlay, rendered above everything when pinStage is set) ----
  const pinModal = pinStage && e("div", {
    className: "fixed inset-0 z-[60] bg-black/60 flex items-center justify-center p-4",
    onClick: ev => { if (ev.target === ev.currentTarget && pinStage.mode === "enter") viewReadOnlyInsteadOfPin(); }
  },
    e("div", {className: "wc-card rounded-2xl p-6 shadow-2xl max-w-sm w-full"},
      pinStage.mode === "enter" && e("div", null,
        e("h3", {className: "text-lg font-bold text-blue-900 mb-1"}, "Enter PIN for " + pinStage.name),
        e("p", {className: "text-xs text-gray-500 mb-4"}, "This name is PIN-protected. Enter the 3-digit PIN to edit picks, or view read-only."),
        e("input", {
          type: "tel", inputMode: "numeric", maxLength: 3, value: pinInput, autoFocus: true,
          onChange: ev => { setPinInput(ev.target.value.replace(/\D/g, "").slice(0, 3)); setPinError(""); },
          onKeyPress: ev => { if (ev.key === "Enter") confirmPinEntry(); },
          placeholder: "• • •",
          className: "w-full text-center text-2xl tracking-[0.5em] font-mono px-4 py-3 border-2 border-blue-300 rounded-xl focus:outline-none focus:border-blue-600 mb-2"
        }),
        pinError && e("p", {className: "text-xs text-red-500 font-semibold mb-3"}, pinError),
        e("div", {className: "flex gap-2 mt-3"},
          e("button", {onClick: confirmPinEntry, className: "flex-1 py-2.5 bg-blue-600 text-white rounded-lg font-bold text-sm hover:bg-blue-700"}, "Unlock"),
          e("button", {onClick: viewReadOnlyInsteadOfPin, className: "flex-1 py-2.5 bg-gray-100 text-gray-700 rounded-lg font-bold text-sm hover:bg-gray-200"}, "View read-only")
        ),
        e("button", {onClick: () => setPinStage(null), className: "w-full mt-3 text-xs text-gray-400 hover:text-gray-600"}, "Cancel")
      ),
      pinStage.mode === "setRequired" && e("div", null,
        e("h3", {className: "text-lg font-bold text-blue-900 mb-1"}, "Set a PIN, " + pinStage.name),
        e("p", {className: "text-xs text-gray-500 mb-4"}, "Pick any 3 digits. This just stops other people from accidentally changing your picks if they tap your name \u2014 not a real password, so don't reuse anything sensitive."),
        e("input", {
          type: "tel", inputMode: "numeric", maxLength: 3, value: pinInput, autoFocus: true,
          onChange: ev => { setPinInput(ev.target.value.replace(/\D/g, "").slice(0, 3)); setPinError(""); },
          onKeyPress: ev => { if (ev.key === "Enter") confirmSetPin(false); },
          placeholder: "• • •",
          className: "w-full text-center text-2xl tracking-[0.5em] font-mono px-4 py-3 border-2 border-blue-300 rounded-xl focus:outline-none focus:border-blue-600 mb-2"
        }),
        pinError && e("p", {className: "text-xs text-red-500 font-semibold mb-3"}, pinError),
        e("button", {onClick: () => confirmSetPin(false), className: "w-full py-2.5 bg-blue-600 text-white rounded-lg font-bold text-sm hover:bg-blue-700 mt-3"}, "Set PIN & continue")
      ),
      pinStage.mode === "setOptional" && e("div", null,
        e("h3", {className: "text-lg font-bold text-blue-900 mb-1"}, "Protect your picks, " + pinStage.name + "?"),
        e("p", {className: "text-xs text-gray-500 mb-4"}, "You don't have a PIN set yet. Add one now so nobody else can accidentally edit your picks \u2014 or skip and you'll be view-only until you set one."),
        e("input", {
          type: "tel", inputMode: "numeric", maxLength: 3, value: pinInput, autoFocus: true,
          onChange: ev => { setPinInput(ev.target.value.replace(/\D/g, "").slice(0, 3)); setPinError(""); },
          onKeyPress: ev => { if (ev.key === "Enter") confirmSetPin(false); },
          placeholder: "• • •",
          className: "w-full text-center text-2xl tracking-[0.5em] font-mono px-4 py-3 border-2 border-blue-300 rounded-xl focus:outline-none focus:border-blue-600 mb-2"
        }),
        pinError && e("p", {className: "text-xs text-red-500 font-semibold mb-3"}, pinError),
        e("div", {className: "flex gap-2 mt-3"},
          e("button", {onClick: () => confirmSetPin(false), className: "flex-1 py-2.5 bg-blue-600 text-white rounded-lg font-bold text-sm hover:bg-blue-700"}, "Set PIN"),
          e("button", {onClick: () => confirmSetPin(true), className: "flex-1 py-2.5 bg-gray-100 text-gray-700 rounded-lg font-bold text-sm hover:bg-gray-200"}, "Skip for now")
        )
      )
    )
  );

  // ---- TICKER TAPE render data ----
  // (The hooks that produce tickerItems/tickerIdx/tickerHidden live near the top of App(),
  //  before any early return — see above. Only plain derived values are computed here.)
  // Clamp index if the item list shrinks (e.g. fewer items after a state change)
  const safeTickerIdx = tickerItems.length ? tickerIdx % tickerItems.length : 0;

  const tickerBar = started && !live && !tickerHidden && tickerItems.length > 0 && e("div", {
    className: "fixed bottom-0 left-0 right-0 z-40 bg-gradient-to-r from-blue-950 via-blue-900 to-teal-900 border-t border-amber-400/30 shadow-[0_-4px_20px_rgba(0,0,0,0.3)]"
  },
    e("div", {className: "max-w-7xl mx-auto px-4 py-2 flex items-center gap-3"},
      e("div", {className: "flex-1 min-w-0 overflow-hidden"},
        e("div", {
          key: safeTickerIdx, // forces remount -> CSS animation replays on each rotation
          className: "flex items-center gap-2 animate-[tickerFade_0.4s_ease]"
        },
          e("span", {className: "text-base flex-shrink-0"}, tickerItems[safeTickerIdx].icon),
          e("span", {className: "text-white text-xs md:text-sm font-semibold truncate"}, tickerItems[safeTickerIdx].text)
        )
      ),
      tickerItems.length > 1 && e("div", {className: "hidden sm:flex items-center gap-1 flex-shrink-0"},
        tickerItems.map((_, i) => e("span", {
          key: i,
          className: "w-1.5 h-1.5 rounded-full transition " + (i === safeTickerIdx ? "bg-amber-400" : "bg-white/25")
        }))
      ),
      e("button", {
        onClick: () => setTickerHidden(true),
        className: "text-white/50 hover:text-white/90 text-xs font-bold flex-shrink-0 px-1",
        title: "Hide ticker"
      }, "\u2715")
    )
  );

  return e("div", {className: "min-h-screen wc-bg p-4 md:p-6" + (tickerBar ? " pb-14" : "")},
    e("div", {className: "max-w-7xl mx-auto"},
      e("div", {className: "text-center mb-6"},
        e("h1", {className: "wc-title text-5xl md:text-6xl text-white"}, "FIFA WORLD CUP 2026"),
        e("p", {className: "text-amber-300 mt-1 text-xs font-bold", style: {letterSpacing: "5px", textTransform: "uppercase"}}, "Prediction Tracker")
      ),
      mainView
    ),
    pinModal,
    tickerBar,
    saveStatus && e("div", {
      className: "fixed " + (tickerBar ? "bottom-14" : "bottom-4") + " right-4 z-50 px-4 py-2 rounded-full text-sm font-bold shadow-2xl flex items-center gap-2 " + (
        saveStatus === "saving" ? "bg-blue-600 text-white" :
        saveStatus === "saved" ? "bg-emerald-600 text-white" :
        "bg-red-600 text-white"
      )
    },
      saveStatus === "saving" ? "Saving..." :
      saveStatus === "saved" ? "Saved \u2713" :
      "Save failed - check connection"
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
