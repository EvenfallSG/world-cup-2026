<script>
const {useState,useEffect,useMemo}=React;
const DB="https://world-cup-2026-predictio-23e8f-default-rtdb.firebaseio.com";
const fbGet=async(p)=>{try{const r=await fetch(DB+p+".json");return r.ok?await r.json():null;}catch{return null;}};

  {id:"E3",t1:"Germany",t2:"Ecuador",g:"E"},{id:"E4",t1:"Curacao",t2:"Ivory Coast",g:"E"},
  {id:"E5",t1:"Germany",t2:"Ivory Coast",g:"E"},{id:"E6",t1:"Ecuador",t2:"Curacao",g:"E"},

  {id:"F3",t1:"Netherlands",t2:"Tunisia",g:"F"},{id:"F4",t1:"Japan",t2:"Sweden",g:"F"},
  {id:"F5",t1:"Netherlands",t2:"Sweden",g:"F"},{id:"F6",t1:"Tunisia",t2:"Japan",g:"F"},
  {id:"G1",t1:"Belgium",t2:"Egypt",g:"G"},{id:"G2",t1:"Iran",t2:"New Zealand",g:"G"},
  {id:"G3",t1:"Belgium",t2:"New Zealand",g:"G"},{id:"G4",t1:"Egypt",t2:"Iran",g:"G"},
  {id:"G5",t1:"Belgium",t2:"Iran",g:"G"},{id:"G6",t1:"Egypt",t2:"New Zealand",g:"G"},
  {id:"H1",t1:"Spain",t2:"Cape Verde",g:"H"},{id:"H2",t1:"Saudi Arabia",t2:"Uruguay",g:"H"},
  {id:"H3",t1:"Spain",t2:"Saudi Arabia",g:"H"},{id:"H4",t1:"Cape Verde",t2:"Uruguay",g:"H"},
  {id:"H5",t1:"Spain",t2:"Uruguay",g:"H"},{id:"H6",t1:"Cape Verde",t2:"Saudi Arabia",g:"H"},
  {id:"I1",t1:"France",t2:"Senegal",g:"I"},{id:"I2",t1:"Iraq",t2:"Norway",g:"I"},
  {id:"I3",t1:"France",t2:"Norway",g:"I"},{id:"I4",t1:"Senegal",t2:"Iraq",g:"I"},
  {id:"I5",t1:"France",t2:"Iraq",g:"I"},{id:"I6",t1:"Norway",t2:"Senegal",g:"I"},
  {id:"J1",t1:"Argentina",t2:"Algeria",g:"J"},{id:"J2",t1:"Austria",t2:"Jordan",g:"J"},
  {id:"J3",t1:"Argentina",t2:"Jordan",g:"J"},{id:"J4",t1:"Algeria",t2:"Austria",g:"J"},
  {id:"J5",t1:"Argentina",t2:"Austria",g:"J"},{id:"J6",t1:"Algeria",t2:"Jordan",g:"J"},
  {id:"K1",t1:"Colombia",t2:"Uzbekistan",g:"K"},{id:"K2",t1:"Portugal",t2:"Congo DR",g:"K"},
  {id:"K3",t1:"Colombia",t2:"Congo DR",g:"K"},{id:"K4",t1:"Uzbekistan",t2:"Portugal",g:"K"},
  {id:"K5",t1:"Colombia",t2:"Portugal",g:"K"},{id:"K6",t1:"Congo DR",t2:"Uzbekistan",g:"K"},

  {id:"L5",t1:"England",t2:"Ghana",g:"L"},{id:"L6",t1:"Panama",t2:"Croatia",g:"L"}
];

const R32=[
  {id:"R32_1",s1:"1A",s2:"2B",date:"Jun 29",label:"M1"},{id:"R32_2",s1:"1B",s2:"2A",date:"Jun 29",label:"M2"},
  {id:"R32_3",s1:"1C",s2:"2D",date:"Jun 30",label:"M3"},{id:"R32_4",s1:"1D",s2:"2C",date:"Jun 30",label:"M4"},
  {id:"R32_5",s1:"1E",s2:"2F",date:"Jul 1",label:"M5"},{id:"R32_6",s1:"1F",s2:"2E",date:"Jul 1",label:"M6"},
  {id:"R32_7",s1:"1G",s2:"2H",date:"Jul 2",label:"M7"},{id:"R32_8",s1:"1H",s2:"2G",date:"Jul 2",label:"M8"},

const QF=[
  {id:"QF1",f1:"R32_1",f2:"R32_2",date:"Jul 5",label:"QF1"},{id:"QF2",f1:"R32_3",f2:"R32_4",date:"Jul 5",label:"QF2"},
  {id:"QF3",f1:"R32_5",f2:"R32_6",date:"Jul 6",label:"QF3"},{id:"QF4",f1:"R32_7",f2:"R32_8",date:"Jul 6",label:"QF4"},
  {id:"QF5",f1:"R32_9",f2:"R32_10",date:"Jul 7",label:"QF5"},{id:"QF6",f1:"R32_11",f2:"R32_12",date:"Jul 7",label:"QF6"}
];
const SF=[
  {id:"SF1",f1:"QF1",f2:"QF2",date:"Jul 9",label:"SF1"},
  {id:"SF2",f1:"QF3",f2:"QF4",date:"Jul 10",label:"SF2"},
  {id:"SF3",f1:"QF5",f2:"QF6",date:"Jul 11",label:"SF3"}
];

function calcStandings(pid,preds){
  const st={};
  Object.keys(GT).forEach(g=>{st[g]=GT[g].map(t=>({team:t,pts:0,played:0,w:0,d:0,l:0,gf:0,ga:0}));});
  GM.forEach(m=>{
    const sc=preds[pid+"-"+m.id];
    if(!sc||!sc.includes("-"))return;
    const parts=sc.split("-");
    const gf=parseInt(parts[0]);const ga=parseInt(parts[1]);
    if(isNaN(gf)||isNaN(ga))return;
    const t1=st[m.g].find(t=>t.team===m.t1);
    const t2=st[m.g].find(t=>t.team===m.t2);
    if(!t1||!t2)return;
    t1.gf+=gf;t1.ga+=ga;t1.played++;
    t2.gf+=ga;t2.ga+=gf;t2.played++;
    if(gf>ga){t1.pts+=3;t1.w++;t2.l++;}
    else if(gf<ga){t2.pts+=3;t2.w++;t1.l++;}
    else{t1.pts++;t2.pts++;t1.d++;t2.d++;}
  });
  const q={};
  Object.keys(st).forEach(g=>{
    st[g].sort((a,b)=>{
      if(b.pts!==a.pts)return b.pts-a.pts;
      const gdB=b.gf-b.ga,gdA=a.gf-a.ga;
      if(gdB!==gdA)return gdB-gdA;
      return b.gf-a.gf;
    });
    q[g]={first:st[g][0]?.team||null,second:st[g][1]?.team||null};
  });
  return{standings:st,qualified:q};
}

function App(){
  const [players,setPlayers]=useState([]);
  const [newName,setNewName]=useState("");
  const [pid,setPid]=useState(null);
  const [pname,setPname]=useState("");
  const [tab,setTab]=useState("setup");
  const [preds,setPreds]=useState({});
  const [started,setStarted]=useState(false);
  const [loading,setLoading]=useState(true);
  const [live,setLive]=useState(false);
  const [errs,setErrs]=useState({});

  const regOpen=()=>new Date()<new Date(2026,5,12);

  useEffect(()=>{
    const load=async()=>{
      const d=await fbGet("/");
      if(d){
        if(d.players)setPlayers(Object.values(d.players));
        if(d.predictions)setPreds(d.predictions);
        if(d.tournamentStarted)setStarted(true);
      }
      setLoading(false);
    };
    load();
    const iv=setInterval(load,3000);
    return()=>clearInterval(iv);
  },[]);

  const addPlayer=async()=>{
    const n=newName.trim();if(!n)return;
    const p={id:Date.now().toString(),name:n};
    const up=[...players,p];setPlayers(up);
    const m={};up.forEach(x=>m[x.id]=x);
    await fbSet("/players",m);setNewName("");
  };
  const remPlayer=async(id)=>{
    const up=players.filter(p=>p.id!==id);setPlayers(up);
    const m={};up.forEach(x=>m[x.id]=x);await fbSet("/players",m);
  };
  const startT=async()=>{
    if(players.length<3)return;
    setStarted(true);await fbSet("/tournamentStarted",true);setTab("login");
  };
  const login=(id,name)=>{setPid(id);setPname(name);setTab("group");};
  const logout=()=>{setPid(null);setPname("");setTab("login");};

  const setPred=async(mid,val)=>{
    const key=pid+"-"+mid;
    const ne={...errs};
    if(val&&!/^\d+-\d+$/.test(val)){ne[mid]=true;setErrs(ne);setPreds({...preds,[key]:val});return;}
    delete ne[mid];setErrs(ne);
    const up={...preds,[key]:val};setPreds(up);await fbSet("/predictions",up);
  };
  const setKO=async(mid,val)=>{
    const key=pid+"-"+mid;
    const up={...preds,[key]:val};setPreds(up);await fbSet("/predictions",up);
  };
  const getPred=(mid)=>preds[pid+"-"+mid]||"";
  const gKO=(mid)=>preds[pid+"-"+mid]||null;

  const {standings,qualified}=useMemo(()=>pid?calcStandings(pid,preds):{standings:{},qualified:{}},[pid,preds]);
  const slots=useMemo(()=>{
    if(!pid)return{};
    const s={};
    Object.keys(qualified).forEach(g=>{s["1"+g]=qualified[g].first;s["2"+g]=qualified[g].second;});
    return s;
  },[qualified,pid]);

  const e=React.createElement;

  const BMatch=({mid,t1,t2,date,label,isF})=>{
    const pr=getPred(mid);
    const opts=[t1,t2].filter(Boolean);
    return e("div",{className:"bmatch"},
      e("div",{className:"bteam"+(pr===t1&&t1?" won":!t1?" tbd":"")},t1||"TBD"),
      e("div",{className:"bvs"},label+" - "+date),
      e("div",{className:"bteam"+(pr===t2&&t2?" won":!t2?" tbd":"")},t2||"TBD"),
      opts.length===2
        ?e("select",{value:pr,onChange:ev=>setKO(mid,ev.target.value),className:"bsel"},
            e("option",{value:""},isF?"Pick champion":"Pick winner"),
            opts.map(t=>e("option",{key:t,value:t},t)))
        :e("div",{className:"bdisabled"},opts.length===0?"Complete groups first":"Waiting for earlier picks...")
    );
  };

  const Tab=(l,t)=>e("button",{key:t,onClick:()=>setTab(t),
    className:"px-4 py-2 rounded-lg font-semibold text-sm "+(tab===t?"bg-yellow-300 text-blue-900":"bg-white/20 text-white hover:bg-white/30")},l);

  if(loading)return e("div",{className:"min-h-screen flex items-center justify-center bg-blue-900"},
    e("div",{className:"text-white text-3xl font-bold"},"Loading..."));

  if(live)return e("div",{className:"min-h-screen bg-gradient-to-br from-blue-900 to-green-800 p-8"},
    e("div",{className:"max-w-4xl mx-auto"},
      e("h1",{className:"text-5xl font-bold text-white text-center mb-8"},"LIVE LEADERBOARD"),
      e("div",{className:"bg-white rounded-3xl p-8 shadow-2xl"},
        e("table",{className:"w-full"},
          e("thead",null,e("tr",{className:"border-b-4 border-blue-900"},
            ["Rank","Player"].map(h=>e("th",{key:h,className:"py-4 px-4 text-blue-900 font-bold text-2xl text-left"},h))
          )),
          e("tbody",null,players.map((p,i)=>
            e("tr",{key:p.id,className:"border-b-2 "+(i===0?"bg-yellow-100":i===1?"bg-gray-100":i===2?"bg-orange-100":"")},
              e("td",{className:"px-4 py-6 text-4xl font-bold text-blue-900"},i===0?"1st":i===1?"2nd":i===2?"3rd":(i+1)+"th"),
              e("td",{className:"px-4 py-6 text-3xl font-bold text-blue-900"},p.name)
            )
          ))
        )
      ),
      e("button",{onClick:()=>setLive(false),className:"mt-8 mx-auto block px-8 py-4 bg-red-500 text-white text-2xl rounded-xl font-bold"},"Exit Live Mode")
    )
  );

  return e("div",{className:"min-h-screen bg-gradient-to-br from-blue-900 via-blue-800 to-green-800 p-4 md:p-6"},
    e("div",{className:"max-w-7xl mx-auto"},
      e("div",{className:"text-center mb-6"},
        e("h1",{className:"text-4xl md:text-5xl font-bold text-white"},"FIFA World Cup 2026"),
        e("p",{className:"text-blue-100 mt-1"},"Prediction Tracker")
      ),

      !started&&e("div",{className:"bg-white/95 rounded-2xl p-8 shadow-2xl max-w-2xl mx-auto"},
        e("h2",{className:"text-2xl font-bold text-blue-900 mb-6"},"Tournament Setup"),
        e("div",{className:"flex gap-2 mb-4"},
          e("input",{type:"text",value:newName,onChange:ev=>setNewName(ev.target.value),
            onKeyPress:ev=>ev.key==="Enter"&&addPlayer(),placeholder:"Player name...",
            className:"flex-1 px-4 py-3 border-2 border-blue-300 rounded-lg focus:outline-none focus:border-blue-600"}),
          e("button",{onClick:addPlayer,className:"px-6 py-3 bg-blue-600 text-white rounded-lg font-semibold hover:bg-blue-700"},"Add")
        ),
        e("div",{className:"grid grid-cols-2 md:grid-cols-3 gap-3 mb-6"},
          players.map(p=>e("div",{key:p.id,className:"flex items-center justify-between bg-blue-50 p-3 rounded-lg"},
            e("span",{className:"font-semibold text-blue-900"},p.name),
            e("button",{onClick:()=>remPlayer(p.id),className:"text-red-500 hover:text-red-700 font-bold ml-2"},"x")
          ))
        ),
        e("p",{className:"text-sm text-gray-500 mb-4"},
          players.length+" player"+(players.length!==1?"s":"")+" added"+(players.length<3?" — need at least 3 to start":"")),
        players.length>=3&&e("button",{onClick:startT,
          className:"w-full py-4 bg-gradient-to-r from-blue-600 to-green-600 text-white text-xl font-bold rounded-xl hover:shadow-xl transition"},
          "Start Tournament!")
      ),

      started&&!pid&&e("div",{className:"bg-white/95 rounded-2xl p-8 shadow-2xl max-w-md mx-auto"},
        e("h2",{className:"text-2xl font-bold text-blue-900 mb-6 text-center"},"Welcome!"),
        regOpen()&&e("div",{className:"mb-6"},
          e("p",{className:"text-gray-600 font-semibold mb-3 text-center"},"New player? Add your name:"),
          e("div",{className:"flex gap-2"},
            e("input",{type:"text",value:newName,onChange:ev=>setNewName(ev.target.value),
              onKeyPress:ev=>ev.key==="Enter"&&addPlayer(),placeholder:"Your name...",
              className:"flex-1 px-4 py-3 border-2 border-blue-300 rounded-lg focus:outline-none focus:border-blue-600"}),
            e("button",{onClick:addPlayer,className:"px-5 py-3 bg-green-600 text-white rounded-lg font-semibold hover:bg-green-700"},"Join")
          ),
          e("p",{className:"text-xs text-gray-400 text-center mt-2"},"Registration closes June 12")
        ),
        !regOpen()&&e("p",{className:"text-center text-red-500 font-bold mb-4"},"Registration closed"),
        e("p",{className:"text-gray-600 font-semibold mb-3 text-center"},"Select your name:"),
        e("div",{className:"space-y-2"},
          players.map(p=>e("button",{key:p.id,onClick:()=>login(p.id,p.name),
            className:"w-full py-3 bg-blue-600 text-white rounded-lg font-semibold hover:bg-blue-700 transition"},p.name))
        )
      ),

      started&&pid&&e("div",null,
        e("div",{className:"flex gap-2 mb-6 justify-center flex-wrap"},
          Tab("Group Stage","group"),
          Tab("Standings","standings"),
          Tab("Bracket","bracket"),
          e("button",{key:"live",onClick:()=>setLive(true),
            className:"px-4 py-2 rounded-lg font-semibold text-sm bg-purple-500/80 text-white hover:bg-purple-600"},"Live Leaderboard"),
          e("button",{key:"out",onClick:logout,
            className:"px-4 py-2 rounded-lg font-semibold text-sm bg-red-500/80 text-white hover:bg-red-600"},"Logout ("+pname+")")
        ),

        tab==="group"&&e("div",{className:"bg-white/95 rounded-2xl p-6 shadow-2xl"},
          e("h2",{className:"text-2xl font-bold text-blue-900 mb-1"},"Group Stage Predictions"),
          e("p",{className:"text-gray-500 text-sm mb-6"},'Enter predicted scores as "2-1". Your bracket auto-populates from these.'),
          e("div",{className:"grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6"},
            Object.keys(GT).map(g=>e("div",{key:g},
              e("h3",{className:"text-base font-bold text-blue-900 mb-3 bg-blue-100 rounded-lg px-3 py-2"},"Group "+g),
              GM.filter(m=>m.g===g).map(m=>
                e("div",{key:m.id,className:"p-2 rounded-lg mb-2 "+(errs[m.id]?"bg-red-50 border border-red-300":"bg-blue-50")},
                  e("div",{className:"flex items-center gap-2"},
                    e("div",{className:"flex-1 text-sm font-semibold text-blue-900"},m.t1+" vs "+m.t2),
                    e("input",{type:"text",value:getPred(m.id),onChange:ev=>setPred(m.id,ev.target.value),
                      placeholder:"2-1",
                      className:"w-16 px-2 py-1 border-2 "+(errs[m.id]?"border-red-400":"border-blue-300")+" rounded font-mono text-center text-sm focus:outline-none focus:border-blue-600"})
                  ),
                  errs[m.id]&&e("p",{className:"text-red-500 text-xs mt-1"},"Format: 2-1")
                )
              )
            ))
          )
        ),

        tab==="standings"&&e("div",{className:"bg-white/95 rounded-2xl p-6 shadow-2xl"},
          e("h2",{className:"text-2xl font-bold text-blue-900 mb-1"},"Your Predicted Standings"),
          e("p",{className:"text-gray-500 text-sm mb-6"},"Green = qualified (top 2). Tiebreakers: Goal Difference, then Goals Scored."),
          e("div",{className:"grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6"},
            Object.keys(standings).map(g=>{
              const q=qualified[g];
              return e("div",{key:g},
                e("div",{className:"flex items-center gap-2 mb-2"},
                  e("h3",{className:"text-base font-bold text-blue-900 bg-blue-100 rounded-lg px-3 py-2 flex-1"},"Group "+g),
                  q?.first&&e("span",{className:"text-xs bg-green-200 text-green-900 px-2 py-1 rounded-full font-bold"},q.first)
                ),
                e("table",{className:"w-full text-xs"},
                  e("thead",null,e("tr",{className:"text-blue-900 font-bold border-b-2 border-blue-200"},
                    ["Team","P","W","D","L","GF","GA","GD","Pts"].map(h=>
                      e("th",{key:h,className:"py-1 "+(h==="Team"?"text-left pl-1":"text-center")},h))
                  )),
                  e("tbody",null,standings[g]?.map((t,i)=>
                    e("tr",{key:t.team,className:"border-b border-blue-100 "+(i<2?"bg-green-50":"bg-red-50")},
                      e("td",{className:"py-1 pl-1 font-semibold text-blue-900"},(i===0?"1. ":i===1?"2. ":"x ")+t.team),
                      e("td",{className:"py-1 text-center"},t.played),
                      e("td",{className:"py-1 text-center"},t.w),
                      e("td",{className:"py-1 text-center"},t.d),
                      e("td",{className:"py-1 text-center"},t.l),
                      e("td",{className:"py-1 text-center"},t.gf),
                      e("td",{className:"py-1 text-center"},t.ga),
                      e("td",{className:"py-1 text-center font-bold "+(t.gf-t.ga>0?"text-green-600":t.gf-t.ga<0?"text-red-500":"")},t.gf-t.ga),
                      e("td",{className:"py-1 text-center font-bold text-blue-900"},t.pts)
                    )
                  ))
                )
              );
            })
          )
        ),

        tab==="bracket"&&e("div",{className:"bg-white/95 rounded-2xl p-6 shadow-2xl"},
          e("h2",{className:"text-2xl font-bold text-blue-900 mb-1"},"Your Tournament Bracket"),
          e("p",{className:"text-gray-500 text-sm mb-4"},"Teams auto-fill from your group predictions. Pick the winner of each match to advance them!"),
          e("div",{className:"bscroll"},
            e("div",{className:"bwrap"},
              e("div",{className:"bcol"},
                e("div",{className:"bcolh"},"ROUND OF 32"),
                e("div",{className:"bmatches"},
                  R32.map(m=>e(BMatch,{key:m.id,mid:m.id,t1:slots[m.s1],t2:slots[m.s2],date:m.date,label:m.label}))
                )
              ),
              e("div",{className:"bcol"},
                e("div",{className:"bcolh"},"QUARTER FINALS"),
                e("div",{className:"bmatches"},
                  QF.map(m=>e(BMatch,{key:m.id,mid:m.id,t1:gKO(m.f1),t2:gKO(m.f2),date:m.date,label:m.label}))
                )
              ),
              e("div",{className:"bcol"},
                e("div",{className:"bcolh"},"SEMI FINALS"),
                e("div",{className:"bmatches"},
                  SF.map(m=>e(BMatch,{key:m.id,mid:m.id,t1:gKO(m.f1),t2:gKO(m.f2),date:m.date,label:m.label}))
                )
              ),
              e("div",{className:"bcol"},
                e("div",{className:"bcolh final"},"THE FINAL - Jul 19"),
                e("div",{className:"bmatches",style:{justifyContent:"center"}},
                  e(BMatch,{mid:"FINAL",t1:gKO("SF1"),t2:gKO("SF2"),date:"Jul 19",label:"FINAL",isF:true})
                )
              )
            )
          )
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
