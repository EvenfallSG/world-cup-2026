<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA World Cup 2026 Predictor</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

<body>
    <div id="root"></div>

    <script>
        const { useState, useEffect } = React;
        const FIREBASE_DB_URL = "https://world-cup-2026-predictio-23e8f.firebaseio.com";

        const firebaseGet = async (path) => {
            try {
                const response = await fetch(`${FIREBASE_DB_URL}${path}.json`);
                if (!response.ok) throw new Error('Firebase error');
                return await response.json();
            } catch (error) {
                console.error('Firebase GET error:', error);
                return null;
            }
        };

        const firebaseSet = async (path, data) => {
            try {
                const response = await fetch(`${FIREBASE_DB_URL}${path}.json`, {
                    method: 'PUT',
                    body: JSON.stringify(data)
                });
                if (!response.ok) throw new Error('Firebase error');
                return true;
            } catch (error) {
                console.error('Firebase SET error:', error);
                return false;
            }
        };

        const groupMatches = [
            { id: 'A1', team1: 'Mexico', team2: 'South Africa', group: 'A' },
            { id: 'A2', team1: 'South Korea', team2: 'Czechia', group: 'A' },
            { id: 'A3', team1: 'Mexico', team2: 'Czechia', group: 'A' },
            { id: 'A4', team1: 'South Korea', team2: 'South Africa', group: 'A' },
            { id: 'A5', team1: 'Mexico', team2: 'South Korea', group: 'A' },
            { id: 'A6', team1: 'Czechia', team2: 'South Africa', group: 'A' },
            { id: 'B1', team1: 'Canada', team2: 'Bosnia-Herzegovina', group: 'B' },
            { id: 'B2', team1: 'Qatar', team2: 'Switzerland', group: 'B' },

            { id: 'B6', team1: 'Bosnia-Herzegovina', team2: 'Qatar', group: 'B' },
            { id: 'C1', team1: 'Brazil', team2: 'Morocco', group: 'C' },
            { id: 'C2', team1: 'Haiti', team2: 'Scotland', group: 'C' },
            { id: 'C3', team1: 'Brazil', team2: 'Scotland', group: 'C' },
            { id: 'C4', team1: 'Morocco', team2: 'Haiti', group: 'C' },

            { id: 'D1', team1: 'United States', team2: 'Paraguay', group: 'D' },
            { id: 'D2', team1: 'Australia', team2: 'Türkiye', group: 'D' },
            { id: 'D3', team1: 'United States', team2: 'Australia', group: 'D' },
            { id: 'D4', team1: 'Türkiye', team2: 'Paraguay', group: 'D' },
            { id: 'D5', team1: 'United States', team2: 'Türkiye', group: 'D' },
            { id: 'D6', team1: 'Paraguay', team2: 'Australia', group: 'D' },
            { id: 'E1', team1: 'Germany', team2: 'Curaçao', group: 'E' },
            { id: 'E2', team1: 'Ivory Coast', team2: 'Ecuador', group: 'E' },
            { id: 'E3', team1: 'Germany', team2: 'Ecuador', group: 'E' },
            { id: 'E4', team1: 'Curaçao', team2: 'Ivory Coast', group: 'E' },
            { id: 'E5', team1: 'Germany', team2: 'Ivory Coast', group: 'E' },
            { id: 'E6', team1: 'Ecuador', team2: 'Curaçao', group: 'E' },
            { id: 'F1', team1: 'Netherlands', team2: 'Japan', group: 'F' },
            { id: 'F2', team1: 'Sweden', team2: 'Tunisia', group: 'F' },
            { id: 'F3', team1: 'Netherlands', team2: 'Tunisia', group: 'F' },
            { id: 'F4', team1: 'Japan', team2: 'Sweden', group: 'F' },
            { id: 'F5', team1: 'Netherlands', team2: 'Sweden', group: 'F' },
            { id: 'F6', team1: 'Tunisia', team2: 'Japan', group: 'F' },
            { id: 'G1', team1: 'Belgium', team2: 'Egypt', group: 'G' },
            { id: 'G2', team1: 'Iran', team2: 'New Zealand', group: 'G' },
            { id: 'G3', team1: 'Belgium', team2: 'New Zealand', group: 'G' },
            { id: 'G4', team1: 'Egypt', team2: 'Iran', group: 'G' },
            { id: 'G5', team1: 'Belgium', team2: 'Iran', group: 'G' },
            { id: 'G6', team1: 'Egypt', team2: 'New Zealand', group: 'G' },
            { id: 'H1', team1: 'Spain', team2: 'Cape Verde', group: 'H' },
            { id: 'H2', team1: 'Saudi Arabia', team2: 'Uruguay', group: 'H' },
            { id: 'H3', team1: 'Spain', team2: 'Saudi Arabia', group: 'H' },
            { id: 'H4', team1: 'Cape Verde', team2: 'Uruguay', group: 'H' },
            { id: 'H5', team1: 'Spain', team2: 'Uruguay', group: 'H' },
            { id: 'H6', team1: 'Cape Verde', team2: 'Saudi Arabia', group: 'H' },
            { id: 'I1', team1: 'France', team2: 'Senegal', group: 'I' },
            { id: 'I2', team1: 'Iraq', team2: 'Norway', group: 'I' },
            { id: 'I3', team1: 'France', team2: 'Norway', group: 'I' },
            { id: 'I4', team1: 'Senegal', team2: 'Iraq', group: 'I' },
            { id: 'I5', team1: 'France', team2: 'Iraq', group: 'I' },
            { id: 'I6', team1: 'Norway', team2: 'Senegal', group: 'I' },
            { id: 'J1', team1: 'Argentina', team2: 'Algeria', group: 'J' },
            { id: 'J2', team1: 'Austria', team2: 'Jordan', group: 'J' },
            { id: 'J3', team1: 'Argentina', team2: 'Jordan', group: 'J' },
            { id: 'J4', team1: 'Algeria', team2: 'Austria', group: 'J' },
            { id: 'J5', team1: 'Argentina', team2: 'Austria', group: 'J' },
            { id: 'J6', team1: 'Algeria', team2: 'Jordan', group: 'J' },
            { id: 'K1', team1: 'Colombia', team2: 'Uzbekistan', group: 'K' },
            { id: 'K2', team1: 'Portugal', team2: 'Congo DR', group: 'K' },
            { id: 'K3', team1: 'Colombia', team2: 'Congo DR', group: 'K' },
            { id: 'K4', team1: 'Uzbekistan', team2: 'Portugal', group: 'K' },
            { id: 'K5', team1: 'Colombia', team2: 'Portugal', group: 'K' },
            { id: 'K6', team1: 'Congo DR', team2: 'Uzbekistan', group: 'K' },
            { id: 'L1', team1: 'England', team2: 'Croatia', group: 'L' },
            { id: 'L2', team1: 'Ghana', team2: 'Panama', group: 'L' },
            { id: 'L3', team1: 'England', team2: 'Panama', group: 'L' },
            { id: 'L4', team1: 'Croatia', team2: 'Ghana', group: 'L' },
            { id: 'L5', team1: 'England', team2: 'Ghana', group: 'L' },
            { id: 'L6', team1: 'Panama', team2: 'Croatia', group: 'L' },
        ];

        const WorldCup2026Predictor = () => {
            const [players, setPlayers] = useState([]);
            const [newPlayerName, setNewPlayerName] = useState('');
            const [currentPlayerId, setCurrentPlayerId] = useState(null);
            const [currentPlayerName, setCurrentPlayerName] = useState('');
            const [activeTab, setActiveTab] = useState('setup');
            const [predictions, setPredictions] = useState({});
            const [tournamentStarted, setTournamentStarted] = useState(false);
            const [loading, setLoading] = useState(true);
            const [liveLeaderboardMode, setLiveLeaderboardMode] = useState(false);

            const isRegistrationOpen = () => {
                const today = new Date();
                const cutoffDate = new Date(2026, 5, 12);
                return today < cutoffDate;
            };

            useEffect(() => {
                loadData();
                const interval = setInterval(loadData, 2000);
                return () => clearInterval(interval);
            }, []);

            const loadData = async () => {
                const data = await firebaseGet('/');
                if (data) {
                    if (data.players) setPlayers(Object.values(data.players));
                    if (data.predictions) setPredictions(data.predictions);
                    if (data.tournamentStarted) setTournamentStarted(data.tournamentStarted);
                }
                setLoading(false);
            };

            const addPlayer = async () => {
                if (newPlayerName.trim()) {
                    const newPlayer = { id: Date.now().toString(), name: newPlayerName };
                    const updatedPlayers = [...players, newPlayer];
                    setPlayers(updatedPlayers);
                    const playersList = {};
                    updatedPlayers.forEach(p => { playersList[p.id] = p; });
                    await firebaseSet('/players', playersList);
                    setNewPlayerName('');
                }
            };

            const removePlayer = async (id) => {
                const updatedPlayers = players.filter(p => p.id !== id);
                setPlayers(updatedPlayers);
                const playersList = {};
                updatedPlayers.forEach(p => { playersList[p.id] = p; });
                await firebaseSet('/players', playersList);
            };

            const startTournament = async () => {
                if (players.length >= 3) {
                    setTournamentStarted(true);
                    await firebaseSet('/tournamentStarted', true);
                    setActiveTab('login');
                }
            };

            const loginPlayer = (playerId, playerName) => {
                setCurrentPlayerId(playerId);
                setCurrentPlayerName(playerName);
                setActiveTab('predictions');
            };

            const logout = () => {
                setCurrentPlayerId(null);
                setCurrentPlayerName('');
                setActiveTab('login');
            };

            const setPrediction = async (playerId, matchId, score) => {
                const key = `${playerId}-${matchId}`;
                const updatedPredictions = { ...predictions, [key]: score };
                setPredictions(updatedPredictions);
                await firebaseSet('/predictions', updatedPredictions);
            };

            const getPlayerPrediction = (playerId, matchId) => {
                return predictions[`${playerId}-${matchId}`] || '';
            };

            const calculateGroupStandings = (playerId) => {
                const standings = {};
                const groups = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I', 'J', 'K', 'L'];
                
                groups.forEach(group => {
                    const teamsList = [...new Set(groupMatches.filter(m => m.group === group).flatMap(m => [m.team1, m.team2]))];
                    standings[group] = teamsList.map(team => ({
                        team,
                        points: 0,
                        played: 0,
                        wins: 0,
                        draws: 0,
                        losses: 0,
                        goalsFor: 0,
                        goalsAgainst: 0
                    }));
                });

                groupMatches.forEach(match => {
                    const score = getPlayerPrediction(playerId, match.id);
                    if (!score || !score.includes('-')) return;

                    const [gf, ga] = score.split('-').map(s => parseInt(s.trim()));
                    const group = match.group;
                    
                    const team1Data = standings[group].find(t => t.team === match.team1);
                    const team2Data = standings[group].find(t => t.team === match.team2);

                    if (team1Data && team2Data) {
                        team1Data.goalsFor += gf;
                        team1Data.goalsAgainst += ga;
                        team2Data.goalsFor += ga;
                        team2Data.goalsAgainst += gf;
                        team1Data.played++;
                        team2Data.played++;

                        if (gf > ga) {
                            team1Data.wins++;
                            team1Data.points += 3;
                            team2Data.losses++;
                        } else if (gf < ga) {
                            team2Data.wins++;
                            team2Data.points += 3;
                            team1Data.losses++;
                        } else {
                            team1Data.draws++;
                            team2Data.draws++;
                            team1Data.points += 1;
                            team2Data.points += 1;
                        }
                    }
                });

                const qualified = {};
                groups.forEach(group => {
                    const sorted = standings[group].sort((a, b) => {
                        if (b.points !== a.points) return b.points - a.points;
                        if (b.goalsFor - b.goalsAgainst !== a.goalsFor - a.goalsAgainst) {
                            return (b.goalsFor - b.goalsAgainst) - (a.goalsFor - a.goalsAgainst);
                        }
                        return b.goalsFor - a.goalsFor;
                    });
                    qualified[group] = sorted.slice(0, 2).map(t => t.team);
                });

                return { standings, qualified };
            };

            if (loading) {
                return React.createElement('div', { className: 'min-h-screen bg-gradient-to-br from-blue-900 via-blue-800 to-green-800 flex items-center justify-center' },
                    React.createElement('div', { className: 'text-white text-2xl' }, 'Loading...')
                );
            }

            if (liveLeaderboardMode) {
                return React.createElement('div', { className: 'min-h-screen bg-gradient-to-br from-blue-900 via-blue-800 to-green-800 p-8' },
                    React.createElement('div', { className: 'max-w-6xl mx-auto' },
                        React.createElement('div', { className: 'text-center mb-8' },
                            React.createElement('h1', { className: 'text-6xl font-bold text-white mb-4' }, '🏆 LIVE LEADERBOARD 🏆')
                        ),
                        React.createElement('div', { className: 'text-center mt-8' },
                            React.createElement('button', { onClick: () => setLiveLeaderboardMode(false), className: 'px-8 py-4 bg-red-500 text-white text-2xl font-bold rounded-lg hover:bg-red-600' }, '✕ Exit')
                        )
                    )
                );
            }

            return React.createElement('div', { className: 'min-h-screen bg-gradient-to-br from-blue-900 via-blue-800 to-green-800 p-4 md:p-8' },
                React.createElement('div', { className: 'max-w-7xl mx-auto' },
                    React.createElement('div', { className: 'text-center mb-8' },
                        React.createElement('h1', { className: 'text-4xl md:text-5xl font-bold text-white' }, '🏆 FIFA World Cup 2026 🏆'),
                        React.createElement('p', { className: 'text-blue-100 text-lg' }, 'Prediction Tracker - Score Edition')
                    ),
                    !tournamentStarted && React.createElement('div', { className: 'bg-white/95 rounded-2xl p-8 shadow-2xl' },
                        React.createElement('h2', { className: 'text-3xl font-bold text-blue-900 mb-6' }, 'Tournament Setup'),
                        React.createElement('div', { className: 'mb-8' },
                            React.createElement('p', { className: 'text-gray-600 mb-4' }, 'Add players (unlimited):'),
                            React.createElement('div', { className: 'flex gap-2 mb-4' },
                                React.createElement('input', {
                                    type: 'text',
                                    value: newPlayerName,
                                    onChange: (e) => setNewPlayerName(e.target.value),
                                    onKeyPress: (e) => e.key === 'Enter' && addPlayer(),
                                    placeholder: 'Player name...',
                                    className: 'flex-1 px-4 py-3 border-2 border-blue-300 rounded-lg focus:outline-none focus:border-blue-600'
                                }),
                                React.createElement('button', { onClick: addPlayer, className: 'px-6 py-3 bg-blue-600 text-white rounded-lg font-semibold hover:bg-blue-700' }, 'Add')
                            ),
                            React.createElement('div', { className: 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3' },
                                players.map(player =>
                                    React.createElement('div', { key: player.id, className: 'flex items-center justify-between bg-blue-50 p-4 rounded-lg' },
                                        React.createElement('span', { className: 'font-semibold text-blue-900' }, player.name),
                                        React.createElement('button', { onClick: () => removePlayer(player.id), className: 'text-red-500 hover:text-red-700 font-bold' }, '✕')
                                    )
                                )
                            ),
                            React.createElement('p', { className: 'text-sm text-gray-600 mt-4' }, `${players.length} players added`)
                        ),
                        players.length >= 3 && React.createElement('button', { onClick: startTournament, className: 'w-full px-6 py-4 bg-gradient-to-r from-blue-600 to-green-600 text-white text-xl font-bold rounded-lg hover:shadow-xl transition' }, 'Start Tournament! 🎉')
                    ),
                    tournamentStarted && !currentPlayerId && React.createElement('div', { className: 'bg-white/95 rounded-2xl p-8 shadow-2xl max-w-2xl mx-auto' },
                        React.createElement('h2', { className: 'text-3xl font-bold text-blue-900 mb-6 text-center' }, 'Welcome!'),
                        isRegistrationOpen() ? React.createElement('div', null,
                            React.createElement('p', { className: 'text-gray-600 mb-4 text-center font-semibold' }, 'New player? Add your name:'),
                            React.createElement('div', { className: 'flex gap-2 mb-6' },
                                React.createElement('input', {
                                    type: 'text',
                                    value: newPlayerName,
                                    onChange: (e) => setNewPlayerName(e.target.value),
                                    onKeyPress: (e) => e.key === 'Enter' && addPlayer(),
                                    placeholder: 'Your name...',
                                    className: 'flex-1 px-4 py-3 border-2 border-blue-300 rounded-lg focus:outline-none focus:border-blue-600'
                                }),
                                React.createElement('button', { onClick: addPlayer, className: 'px-6 py-3 bg-green-600 text-white rounded-lg font-semibold hover:bg-green-700' }, 'Add Me')
                            ),
                            React.createElement('p', { className: 'text-sm text-gray-500 text-center mb-6' }, '⏰ Registration closes June 12')
                        ) : React.createElement('p', { className: 'text-center text-red-600 font-bold text-lg mb-6' }, '🔒 Registration Closed'),
                        React.createElement('p', { className: 'text-gray-600 mb-6 text-center font-semibold' }, 'Select your name:'),
                        React.createElement('div', { className: 'space-y-3' },
                            players.map(player =>
                                React.createElement('button', { key: player.id, onClick: () => loginPlayer(player.id, player.name), className: 'w-full px-6 py-3 bg-blue-600 text-white rounded-lg font-semibold hover:bg-blue-700 transition' }, player.name)
                            )
                        )
                    ),
                    tournamentStarted && currentPlayerId && React.createElement('div', null,
                        React.createElement('div', { className: 'flex gap-2 mb-6 justify-center flex-wrap' },
                            React.createElement('button', { onClick: () => setActiveTab('predictions'), className: `px-6 py-2 rounded-lg font-semibold transition ${activeTab === 'predictions' ? 'bg-yellow-300 text-blue-900' : 'bg-white/20 text-white hover:bg-white/30'}` }, 'Predictions'),
                            React.createElement('button', { onClick: () => setActiveTab('standings'), className: `px-6 py-2 rounded-lg font-semibold transition ${activeTab === 'standings' ? 'bg-yellow-300 text-blue-900' : 'bg-white/20 text-white hover:bg-white/30'}` }, 'Standings'),
                            React.createElement('button', { onClick: () => setLiveLeaderboardMode(true), className: 'px-6 py-2 rounded-lg font-semibold transition bg-purple-500/80 text-white hover:bg-purple-600' }, '📺 Live'),
                            React.createElement('button', { onClick: logout, className: 'px-6 py-2 rounded-lg font-semibold transition bg-red-500/80 text-white hover:bg-red-600' }, 'Logout')
                        ),
                        activeTab === 'predictions' && React.createElement('div', { className: 'bg-white/95 rounded-2xl p-8 shadow-2xl' },
                            React.createElement('h2', { className: 'text-2xl font-bold text-blue-900 mb-6' }, 'Predict Match Scores'),
                            React.createElement('p', { className: 'text-gray-600 mb-6' }, 'Enter scores in format: "2-1" (goals for - goals against)'),
                            React.createElement('div', { className: 'space-y-4' },
                                ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I', 'J', 'K', 'L'].map(group =>
                                    React.createElement('div', { key: group },
                                        React.createElement('h3', { className: 'text-xl font-bold text-blue-900 mb-3' }, `Group ${group}`),
                                        React.createElement('div', { className: 'space-y-2' },
                                            groupMatches.filter(m => m.group === group).map(match =>
                                                React.createElement('div', { key: match.id, className: 'p-4 bg-blue-50 rounded-lg flex items-center gap-4' },
                                                    React.createElement('div', { className: 'flex-1' },
                                                        React.createElement('div', { className: 'font-semibold text-blue-900' }, `${match.team1} vs ${match.team2}`)
                                                    ),
                                                    React.createElement('input', {
                                                        type: 'text',
                                                        value: getPlayerPrediction(currentPlayerId, match.id),
                                                        onChange: (e) => setPrediction(currentPlayerId, match.id, e.target.value),
                                                        placeholder: '2-1',
                                                        className: 'w-24 px-3 py-2 border-2 border-blue-300 rounded font-semibold text-center focus:outline-none focus:border-blue-600'
                                                    })
                                                )
                                            )
                                        )
                                    )
                                )
                            )
                        ),
                        activeTab === 'standings' && currentPlayerId && React.createElement('div', { className: 'bg-white/95 rounded-2xl p-8 shadow-2xl' },
                            React.createElement('h2', { className: 'text-2xl font-bold text-blue-900 mb-6' }, 'Your Calculated Standings'),
                            (() => {
                                const { standings, qualified } = calculateGroupStandings(currentPlayerId);
                                return React.createElement('div', { className: 'space-y-8' },
                                    ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I', 'J', 'K', 'L'].map(group =>
                                        React.createElement('div', { key: group },
                                            React.createElement('h3', { className: 'text-xl font-bold text-blue-900 mb-4' }, `Group ${group} - Qualified: ${qualified[group]?.join(' vs ') || 'TBD'}`),
                                            React.createElement('table', { className: 'w-full text-sm' },
                                                React.createElement('thead', null,
                                                    React.createElement('tr', { className: 'border-b-2 border-blue-900' },
                                                        React.createElement('th', { className: 'px-2 py-2 text-left text-blue-900 font-bold' }, 'Team'),
                                                        React.createElement('th', { className: 'px-2 py-2 text-center text-blue-900 font-bold' }, 'P'),
                                                        React.createElement('th', { className: 'px-2 py-2 text-center text-blue-900 font-bold' }, 'W'),
                                                        React.createElement('th', { className: 'px-2 py-2 text-center text-blue-900 font-bold' }, 'D'),
                                                        React.createElement('th', { className: 'px-2 py-2 text-center text-blue-900 font-bold' }, 'L'),
                                                        React.createElement('th', { className: 'px-2 py-2 text-center text-blue-900 font-bold' }, 'GF'),
                                                        React.createElement('th', { className: 'px-2 py-2 text-center text-blue-900 font-bold' }, 'GA'),
                                                        React.createElement('th', { className: 'px-2 py-2 text-center text-blue-900 font-bold' }, 'GD'),
                                                        React.createElement('th', { className: 'px-2 py-2 text-right text-blue-900 font-bold' }, 'Pts')
                                                    )
                                                ),
                                                React.createElement('tbody', null,
                                                    standings[group].map((team, idx) =>
                                                        React.createElement('tr', { key: team.team, className: `${idx < 2 ? 'bg-green-100' : 'bg-red-100'} border-b border-blue-200` },
                                                            React.createElement('td', { className: 'px-2 py-2 font-semibold text-blue-900' }, team.team),
                                                            React.createElement('td', { className: 'px-2 py-2 text-center' }, team.played),
                                                            React.createElement('td', { className: 'px-2 py-2 text-center' }, team.wins),
                                                            React.createElement('td', { className: 'px-2 py-2 text-center' }, team.draws),
                                                            React.createElement('td', { className: 'px-2 py-2 text-center' }, team.losses),
                                                            React.createElement('td', { className: 'px-2 py-2 text-center' }, team.goalsFor),
                                                            React.createElement('td', { className: 'px-2 py-2 text-center' }, team.goalsAgainst),
                                                            React.createElement('td', { className: 'px-2 py-2 text-center font-semibold' }, team.goalsFor - team.goalsAgainst),
                                                            React.createElement('td', { className: 'px-2 py-2 text-right font-bold text-lg text-blue-900' }, team.points)
                                                        )
                                                    )

                                            )

                                    )
                                );
                            })()
                        )
                    )

            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(WorldCup2026Predictor));
